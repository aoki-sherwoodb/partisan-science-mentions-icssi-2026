- name: research_orgs
  type: STRING
  mode: REPEATED
  description: Organisations linked to the publication associated to the dataset.
- name: research_org_cities
  type: INTEGER
  mode: REPEATED
  description: City of the organisations the associated publication authors are affiliated
    to, expressed as GeoNames ID.
- name: research_org_countries
  type: STRING
  mode: REPEATED
  description: Country of the organisations the associated publication authors are
    affiliated to, identified using GeoNames codes.
- name: research_org_state_codes
  type: STRING
  mode: REPEATED
  description: State of the organisations the associated publication authors are affiliated
    to, expressed as GeoNames codes (ISO-3166-2).
- name: file_details
  type: RECORD
  description: Dataset's file details, if available, e.g. format and size.
  fields:
  - name: normalized_file_size
    type: INTEGER
    description: Normalized size (in bytes) of the dataset's document.
  - name: formats
    type: STRING
    mode: REPEATED
    description: Formats of the of the dataset's attached document.
- name: resource_type
  type: STRING
  description: Normalised resource type of the dataset.
- name: references
  type: RECORD
  mode: REPEATED
  description: DOIs/Dimensions Publication IDs for outgoing citations from the dataset's
    document.
  fields:
  - name: doi
    type: STRING
    description: DOI for outgoing citations from the dataset's document.
  - name: publication_id
    type: STRING
    description: Dimensions Publication ID for datasets references i.e. outgoing citations.
- name: funding_details
  type: RECORD
  mode: REPEATED
  description: Funding details linked to the publication the dataset is associated
    with.
  fields:
  - name: org_id
    type: STRING
  - name: grant_id
    type: STRING
- name: associated_grant_ids
  type: STRING
  mode: REPEATED
  description: Dimensions IDs of the grants linked to the publication the dataset
    is associated with.
- name: date
  type: TIMESTAMP
  description: The publication date of the dataset.
- name: date_modified
  type: TIMESTAMP
  description: The last modification date of the dataset.
- name: date_imported_gbq
  type: TIMESTAMP
  description: Timestamp when the dataset was last imported into BigQuery. Incremental
    changes can be determined using this field. Note, however at certain times all
    records may be reimported.
- name: concepts
  type: RECORD
  mode: REPEATED
  description: 'Concepts describing the main topics of a data set (note: automatically
    derived using machine learning).'
  fields:
  - name: concept
    type: STRING
    description: Normalized noun phrase describing a main topic within the document.
      Automatically derived using machine learning techniques.
  - name: relevance
    type: FLOAT
    description: "Relevance ranking of the normalized noun phrase within the document\u2019\
      s field of study."
