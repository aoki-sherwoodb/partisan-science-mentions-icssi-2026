table: datasets
description: "Dimensions datasets - https://app.dimensions.ai/discover/data_set\n\
  Schema documentation: https://docs.dimensions.ai/bigquery/datasource-datasets.html\n\
  \n\n---\nPrivacy and Terms of Use\n\nFor information on how we process personal\
  \ information, please refer to the privacy policy at https://www.dimensions.ai/privacy/.\n\
  \nRedistribution / external use of this Dimensions dataset is prohibited without\
  \ prior written approval. If you need to share or display Dimensions data in a way\
  \ that\u2019s not permitted by our agreement with you, please get in touch at info@dimensions.com."
fields:
- name: id
  type: STRING
  description: Dimensions Dataset ID.
- name: title
  type: STRING
  description: Title of the dataset.
- name: description
  type: STRING
  description: Description of the dataset.
- name: year
  type: INTEGER
  description: Year of publication of the dataset.
- name: created_date
  type: STRING
  description: The creation date of the dataset.
- name: embargo_date
  type: STRING
  description: The embargo date of the dataset.
- name: repository_url
  type: STRING
  description: Repository item URL for the dataset.
- name: doi
  type: STRING
  description: Dataset DOI.
- name: repository_id
  type: STRING
  description: The ID of the repository of the dataset.
- name: repository_name
  type: STRING
  description: The name of the repository of the dataset.
- name: publisher_name
  type: STRING
  description: Name of the publisher of the dataset document.
- name: associated_publication_doi
  type: STRING
  description: The DOI of the publication linked to the dataset (single value).
- name: associated_publication_pmid
  type: STRING
  description: The PubMed id of the associated publication.
- name: associated_publication_arxiv_id
  type: STRING
  description: The arXiv id of the associated publication.
- name: associated_publication_id
  type: STRING
  description: The Dimensions ID of the publication linked to the dataset (single
    value).
- name: citation_string
  type: STRING
  description: The dataset's citation string, currently only provided by data sets
    coming from figshare.
- name: authors
  type: RECORD
  mode: REPEATED
  description: Ordered list of the dataset authors. ORCIDs are included if available.
  fields:
  - name: name
    type: STRING
    description: Name of a dataset author.
  - name: role
    type: STRING
    description: Role for a dataset author (if present).
  - name: orcid
    type: STRING
    description: ORCID Identifier for a dataset author (if present).
  - name: researcher_id
    type: STRING
    description: Dimensions Researcher ID for a dataset author (if present).
  - name: org_ids
    type: STRING
    mode: REPEATED
    description: Associated organization ids of the affiliations.
  - name: affiliations
    type: RECORD
    mode: REPEATED
    description: Author affiliations.
    fields:
    - name: org_id
      type: STRING
    - name: org_name
      type: STRING
    - name: city_id
      type: INTEGER
    - name: country_code
      type: STRING
    - name: state_code
      type: STRING
    - name: raw_affiliation
      type: STRING
- name: researcher_ids
  type: STRING
  mode: REPEATED
  description: "Dimensions Researcher IDs associated to the dataset\u2019s associated\
    \ publication."
- name: license
  type: RECORD
  description: "The dataset license details, including the name and corresponding\
    \ URL of the license if available (eg. \u2018CC BY 4.0\u2019 and \u2018https://creativecommons.org/licenses/by/4.0/\u2019\
    )."
  fields:
  - name: name
    type: STRING
    description: "The dataset licence name, e.g. \u2018CC BY 4.0\u2019."
  - name: url
    type: STRING
    description: "The dataset licence URL, e.g. \u2018https://creativecommons.org/licenses/by/4.0/\u2019\
      ."
- name: category_bra
  type: RECORD
  description: Broad Research Areas
  fields:
  - name: values
    type: STRING
    mode: REPEATED
    description: Listing of all category values assigned to this particular record.
  - name: full
    type: RECORD
    mode: REPEATED
    description: A complete listing of category values, assigned to this particular
      record, including the unique Dimensions identifier associated with each category
      value.
    fields:
    - name: id
      type: STRING
      description: Dimensions specific identifier assigned to the category value.
    - name: value
      type: STRING
      description: Category value associated with the simple classification scheme.
- name: category_for
  type: RECORD
  description: ANZSRC Fields of Research classification
  fields:
  - name: first_level
    type: RECORD
    description: First level of categorisation within the classification scheme.
    fields:
    - name: codes
      type: STRING
      mode: REPEATED
      description: A consolidated list of all category-specific codes at a particular
        classification level, assigned to this record.
    - name: full
      type: RECORD
      mode: REPEATED
      description: A listing of category values at a specific classification level,
        assigned to this particular record, including the unique Dimensions identifier
        associated with each category value.
      fields:
      - name: id
        type: STRING
        description: Dimensions specific identifier assigned to the category value.
      - name: code
        type: STRING
        description: Numeric or non-numeric category value code. Value is classification
          scheme specific.
      - name: name
        type: STRING
        description: Individual category value description, excluding the classification
          scheme specific code prefix.
  - name: second_level
    type: RECORD
    description: Second level of categorisation within the classification scheme.
    fields:
    - name: codes
      type: STRING
      mode: REPEATED
