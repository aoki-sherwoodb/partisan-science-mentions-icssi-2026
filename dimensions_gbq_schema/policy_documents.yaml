table: policy_documents
description: "Dimensions Policy Documents data set - https://app.dimensions.ai/discover/policy_documents\n\
  Schema documentation: https://docs.dimensions.ai/bigquery/datasource-policy-documents.html\n\
  \n\n---\nPrivacy and Terms of Use\n\nFor information on how we process personal\
  \ information, please refer to the privacy policy at https://www.dimensions.ai/privacy/.\n\
  \nRedistribution / external use of this Dimensions dataset is prohibited without\
  \ prior written approval. If you need to share or display Dimensions data in a way\
  \ that\u2019s not permitted by our agreement with you, please get in touch at info@dimensions.com."
fields:
- name: id
  type: STRING
  description: Dimensions policy document ID.
- name: title
  type: STRING
  description: Title of a policy document.
- name: linkout
  type: STRING
  description: Link to the PDF document.
- name: year
  type: INTEGER
  description: The year the document was issued.
- name: publisher
  type: RECORD
  description: The publisher of the policy document.
  fields:
  - name: grid_id
    type: STRING
    description: GRID organization publishing the policy document.
  - name: name
    type: STRING
    description: Name of the policy document publisher.
  - name: country_code
    type: STRING
    description: Country of the organization publishing the policy document, identified
      using GeoNames codes
  - name: state_code
    type: STRING
    description: State of the organization publishing the policy document, expressed
      as GeoNames codes (ISO-3166-2).
  - name: city_id
    type: INTEGER
    description: City of the organization publishing the policy document, expressed
      as GeoNames ID.
- name: cited_publication_ids
  type: STRING
  mode: REPEATED
  description: Dimensions IDs of publications cited by the policy document.
- name: dois
  type: STRING
  mode: REPEATED
  description: DOIs referenced by the document.
- name: pmids
  type: STRING
  mode: REPEATED
  description: PubMed ids referenced by the document.
- name: arxiv_ids
  type: STRING
  mode: REPEATED
  description: arXiv ids referenced by the document.
- name: category_bra
  type: RECORD
