- name: concepts
  type: RECORD
  mode: REPEATED
  description: The automatically extracted key concepts, with their relevancy scores.
  fields:
  - name: concept
    type: STRING
    description: Normalized noun phrase describing a main topic within the document.
      Automatically derived using machine learning techniques.
  - name: relevance
    type: FLOAT
    description: "Relevance ranking of the normalized noun phrase within the document\u2019\
      s field of study."
- name: posted_on
  type: TIMESTAMP
  description: The date the document was issued.
- name: date_inserted
  type: TIMESTAMP
  description: Date when the policy document was inserted into Dimensions.
- name: date_imported_gbq
  type: TIMESTAMP
  description: Timestamp when the policy document was last imported into BigQuery.
    Incremental changes can be determined using this field. Note, however at certain
    times all records may be reimported.
