- name: clinical_trial_ids
  type: STRING
  mode: REPEATED
  description: List of Dimensions clinical trial IDs mentioned in the full text of
    the publication.
- name: funding_details
  type: RECORD
  mode: REPEATED
  description: List of details regarding funding associated with the publication.
  fields:
  - name: grid_id
    type: STRING
    description: Dimensions organisation identifier (GRID) of the funder, if identified.
  - name: grant_id
    type: STRING
    description: Dimensions grant identifier linked to the funding, if identified.
- name: funder_orgs
  type: STRING
  mode: REPEATED
  description: The GRID organisations funding this publication.
- name: document_type
  type: RECORD
  description: The automated document type classification.
  fields:
  - name: classification
    type: STRING
    description: The automated document type classification.
  - name: is_citable
    type: BOOLEAN
    description: The automated citable document flag.
- name: concepts_relevant
  type: RECORD
  mode: REPEATED
  description: 'Concepts describing the main topics of a publication (note: automatically
    derived from the publication text using machine learning). Restricted to concepts
    with a relevance score of >= 0.5.'
  fields:
  - name: concept
    type: STRING
    description: Normalized noun phrase describing a main topic within the document.
      Automatically derived using machine learning techniques.
  - name: relevance
    type: FLOAT
    description: "Relevance ranking of the normalized noun phrase within the document\u2019\
      s field of study."
- name: patent_ids
  type: STRING
  mode: REPEATED
  description: 'Dimensions patent IDs of the patents citing this publication. Note:
    only `front-page` citations are included in this column, please use the patent
    field ``npc_references`` to find all possible patent to publication links.'
- name: citations
  type: RECORD
  mode: REPEATED
  description: Citing publications, provides both Dimensions publication ID as well
    as the year of citation.
  fields:
  - name: id
    type: STRING
    description: Dimensions publication identifier of the citing publication.
  - name: year
    type: INTEGER
    description: Citing publications year of publication.
- name: citations_count
  type: INTEGER
  description: Number of citations.
- name: metrics
  type: RECORD
  description: If available, metrics relating to the publication.
  fields:
  - name: times_cited
    type: INTEGER
    description: Number of citations.
  - name: recent_citations
    type: INTEGER
    description: Number of citations received in the last two years. Does not support
      emptiness filters.
  - name: field_citation_ratio
    type: FLOAT
    description: Relative citation performance of article when compared to similarly
      aged articles in its area of research.
  - name: relative_citation_ratio
    type: FLOAT
    description: Relative citation performance of an article when compared to others
      in its area of research.
- name: source
  type: RECORD
  description: The source title this publication belongs to, this may be a journal,
    a book series or a preprint platform.
  fields:
  - name: id
    type: STRING
    description: The Dimensions source ID, if we could assign one.
  - name: title
    type: STRING
    description: Title of the source the publication belongs to.
  - name: original_title
    type: STRING
    description: The journal/book series/preprint platform name as seen on the original
      document.
  - name: issn
    type: STRING
    description: International Standard Serial Number of the publication's source
      title.
  - name: eissn
    type: STRING
    description: Electronic International Standard Serial Number of the publication's
      source title.
- name: journal
  type: RECORD
  description: '**Deprecated** Using ``source`` over ``journal`` is recommended. The
    journal a publication belongs to. Please note, this can also be pre-print platforms
    or proceedings.'
  fields:
  - name: id
    type: STRING
    description: Dimensions source title identifier for the journal associated with
      the publication.
  - name: title
    type: STRING
    description: Title for the journal associated with the publication.
  - name: issn
    type: STRING
    description: International Standard Serial Number of the publication's journal.
  - name: eissn
    type: STRING
    description: Electronic International Standard Serial Number of the publication's
      journal.
- name: journal_lists
  type: STRING
  mode: REPEATED
  description: "Independent grouping of journals outside of Dimensions, e.g. \u2018\
    ERA 2015\u2019 or \u2018Norwegian register level 1\u2019."
- name: parent_id
  type: STRING
  description: For supported publication types, the Dimensions Publication ID of a
    record considered to be the parent item of the publication (ie. parent book of
    a book chapter).
- name: source_id
  type: STRING
  description: The Dimensions source title ID for the publication.
- name: funding_section
  type: RECORD
  description: The funding section text as found in the source document.
  fields:
  - name: preferred
    type: STRING
    description: English version of the value or the translated to English representation
      (where an original value is also present).
  - name: original
    type: STRING
    description: Original non-English value as present within the source.
- name: researcher_ids
  type: STRING
  mode: REPEATED
  description: Dimensions Researcher IDs matched to the publication authors list.
- name: research_orgs
  type: STRING
  mode: REPEATED
  description: GRID organisations associated to the publication. Identifiers are automatically
    extracted from author affiliations text, so they can be missing in some cases.
- name: research_org_cities
  type: INTEGER
  mode: REPEATED
  description: City of the organisations authors are affiliated to, expressed as GeoNames
    ID and name.
- name: research_org_city_names
  type: STRING
  mode: REPEATED
  description: City names of the organisations authors are affiliated to.
- name: research_org_countries
  type: STRING
  mode: REPEATED
  description: Country of the organisations authors are affiliated to, identified
    using GeoNames codes.
- name: research_org_country_names
  type: STRING
  mode: REPEATED
  description: Country names of the organisations that authors are affiliated to,
    as a string.
- name: research_org_state_codes
  type: STRING
  mode: REPEATED
  description: Country specific state codes of the organisations that authors are
    affiliated to, expressed as GeoNames codes (ISO-3166-2).
- name: research_org_state_names
  type: STRING
  mode: REPEATED
  description: State names of the organisations that authors are affiliated to, as
    a string.
- name: supporting_grant_ids
  type: STRING
  mode: REPEATED
  description: Grants supporting the publication, list of Dimensions Grant IDs.
- name: funder_countries
  type: STRING
  mode: REPEATED
  description: Country of the organisations funding this publication, identified using
    GeoNames codes.
- name: authors
  type: RECORD
  mode: REPEATED
  description: Ordered list of author names and their affiliations, as they appear
    in the original publication. The listing can include researcher and organization
    identifiers, where available.
  fields:
  - name: first_name
    type: STRING
    description: First name of the author.
  - name: last_name
    type: STRING
    description: Last/family name of the author.
  - name: initials
    type: STRING
    description: 'Initials for the author. Note: this is no longer populated and has
      been deprecated.'
  - name: researcher_id
    type: STRING
    description: The determined Dimensions Researcher ID for the author.
  - name: grid_ids
    type: STRING
    mode: REPEATED
    description: Based on the affiliation addresses, associated GRID organisation
      identifiers for the author.
  - name: orcid
    type: STRING
    mode: REPEATED
    description: If present, the ORCID identifier for the author.
  - name: corresponding
    type: BOOLEAN
    description: Indicator that the author is considered a corresponding author for
      the publication.
  - name: raw_affiliations
    type: STRING
    mode: REPEATED
    description: Listing of raw affiliations, as seen in the source document.
  - name: affiliations_address
    type: RECORD
    mode: REPEATED
    description: Listing of processed affiliation addresses.
    fields:
    - name: grid_id
      type: STRING
      description: GRID organisation identifier assigned to the affiliation.
    - name: city_id
      type: INTEGER
      description: City identified in the affiliation, as GeoName IDs.
    - name: state_code
      type: STRING
      description: State/region identified in the affiliation, as ISO 3166-2 codes.
    - name: country_code
      type: STRING
      description: Country/territory identified in the affiliation, as ISO-3166 alpha-2
        codes.
    - name: raw_affiliation
      type: STRING
      description: Raw affiliation address as seen in the source document.
- name: altmetrics
  type: RECORD
  description: If available, Altmetric details relating to the publication.
  fields:
  - name: id
    type: STRING
    description: Altmetric research output identifier linked to this publication.
  - name: score
    type: INTEGER
    description: Altmetric Attention Score
