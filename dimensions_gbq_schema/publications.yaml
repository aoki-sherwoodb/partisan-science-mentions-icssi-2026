table: publications
fields:
- name: id
  type: STRING
  description: Dimensions publication ID.
- name: date_inserted
  type: TIMESTAMP
  description: Date when the record was inserted into Dimensions.
- name: date_imported_gbq
  type: TIMESTAMP
  description: Timestamp when the publication was last imported into BigQuery. Incremental
    changes can be determined using this field. Note, however that at certain times
    all records may be reimported.
- name: title
  type: RECORD
  description: Title of a publication.
  fields:
  - name: preferred
    type: STRING
    description: English version of the value or the translated to English representation
      (where an original value is also present).
  - name: original
    type: STRING
    description: Original non-English value as present within the source.
- name: year
  type: INTEGER
  description: 'The year of publication for the version of record (note: when the
    date field is available, this is equal to the year part of the full date).'
- name: doi
  type: STRING
  description: Digital object identifier.
- name: volume
  type: STRING
  description: Publication volume.
- name: issue
  type: STRING
  description: The issue number of a publication.
- name: pages
  type: STRING
  description: The pages of the publication, as they would appear in a citation record.
- name: subtitles
  type: STRING
  mode: REPEATED
  description: Subtitles of a publication (when available).
- name: abstract
  type: RECORD
  description: The abstract of a publication.
  fields:
  - name: preferred
    type: STRING
    description: English version of the value or the translated to English representation
      (where an original value is also present).
  - name: original
    type: STRING
    description: Original non-English value as present within the source.
- name: acknowledgements
  type: RECORD
  description: The acknowledgements section text as found in the source document.
  fields:
  - name: preferred
    type: STRING
    description: English version of the value or the translated to English representation
      (where an original value is also present).
  - name: original
    type: STRING
    description: Original non-English value as present within the source.
- name: copyright_statement
  type: STRING
  description: The copyright status as found in the source document.
- name: publisher
  type: RECORD
  description: The publisher associated with the publication.
  fields:
  - name: id
    type: STRING
    description: Dimensions publisher identifier linked to the publication's publisher.
  - name: name
    type: STRING
    description: Name of the publisher linked to the publication.
- name: pmid
  type: STRING
  description: PubMed ID.
- name: pmcid
  type: STRING
  description: PubMed Central ID.
- name: type
  type: STRING
  description: 'Publication type (one of: article, chapter, proceeding, monograph,
    preprint or book).'
- name: date
  type: STRING
  description: "The publication date for the version of record of a document, eg \u201C\
    2018-01-01\u201D (note: dates can sometimes be incomplete and include only the\
    \ month or the year)."
- name: date_normal
  type: DATE
  description: The publication date for the version of record of a document, normalised
    for partial dates which do not include a month/day value (ie. '2020' converts
    to '2020-01-01').
- name: date_online
  type: STRING
  description: The publication online date.
- name: date_print
  type: STRING
  description: The publication print date.
- name: date_accepted
  type: STRING
  description: The publication acceptance date.
- name: date_submitted
  type: STRING
  description: The publication submission date.
- name: open_access_categories
  type: STRING
  mode: REPEATED
  description: '** Deprecated: please preference use of the field `open_access_categories_v2`
    **'
- name: open_access_categories_v2
  type: STRING
  mode: REPEATED
  description: Open Access categories of a publication (`latest version <https://www.dimensions.ai/wp-content/uploads/2021/02/Dimensions_New-OA-status-definition.pdf>`_).
- name: book_title
  type: RECORD
  description: 'The title of the book a chapter belongs to (note: this field is available
    only for `chapters`).'
  fields:
  - name: preferred
    type: STRING
    description: English version of the value or the translated to English representation
      (where an original value is also present).
  - name: original
    type: STRING
    description: Original non-English value as present within the source.
- name: book_series_title
  type: RECORD
  description: Title of the book series that a publication belongs to.
  fields:
  - name: preferred
    type: STRING
    description: English version of the value or the translated to English representation
      (where an original value is also present).
  - name: original
    type: STRING
    description: Original non-English value as present within the source.
- name: proceedings_title
  type: RECORD
  description: Title of the conference proceedings volume associated to a publication.
  fields:
  - name: preferred
    type: STRING
    description: English version of the value or the translated to English representation
      (where an original value is also present).
  - name: original
    type: STRING
    description: Original non-English value as present within the source.
- name: conference
  type: RECORD
  description: Details of the associated conference.
  fields:
  - name: name
    type: STRING
    description: For conference proceedings, where available, the name of the associated
      conference.
  - name: location
    type: STRING
    description: For conference proceedings, where available, the location of the
      conference.
- name: event
  type: RECORD
  description: Details of the associated event.
  fields:
  - name: conference_name
    type: STRING
    description: For conference events, where available, the name of the associated
      conference.
  - name: conference_location
    type: STRING
    description: For conference events, where available, the location of the conference.
  - name: conference_sponsor
    type: STRING
    description: For conference events, where available, the sponsor of the conference.
  - name: conference_date
    type: STRING
    description: For conference events, where available, the date of the conference.
- name: repository_dois
  type: STRING
  mode: REPEATED
  description: Identified DOIs based on DOI prefixes from Figshare and DataCite.
- name: arxiv_id
  type: STRING
  description: "arXiv identifier (e.g. \u2018arXiv:2102.02477\u2019)."
- name: resulting_publication_doi
  type: STRING
  description: For preprints, the DOIs of the resulting full publications.
- name: eisbn
  type: STRING
  description: For supported publication types, the International Standard Book Number
    (ISBN) of an electronic edition.
- name: isbn
  type: STRING
  description: For supported publication types, the International Standard Book Number
    (ISBN).
- name: editors
  type: RECORD
  mode: REPEATED
  description: For supported publication types, the associated editors.
  fields:
  - name: first_name
    type: RECORD
    description: First name of the associated editor.
    fields:
    - name: preferred
      type: STRING
      description: English version of the value or the translated to English representation
        (where an original value is also present).
    - name: original
      type: STRING
      description: Original non-English value as present within the source.
  - name: last_name
    type: RECORD
    description: Family/last name of the associated editor.
    fields:
    - name: preferred
      type: STRING
      description: English version of the value or the translated to English representation
        (where an original value is also present).
    - name: original
      type: STRING
      description: Original non-English value as present within the source.
- name: reference_ids
  type: STRING
  mode: REPEATED
  description: Dimensions publication ID for publications within the references list,
    i.e. outgoing citations.
- name: concepts
  type: RECORD
  mode: REPEATED
  description: 'Concepts describing the main topics of a publication (note: automatically
    derived from the publication text using machine learning).'
  fields:
  - name: concept
    type: STRING
    description: Normalized noun phrase describing a main topic within the document.
      Automatically derived using machine learning techniques.
  - name: relevance
    type: FLOAT
    description: "Relevance ranking of the normalized noun phrase within the document\u2019\
      s field of study."
- name: mesh_headings
  type: STRING
  mode: REPEATED
  description: '** Deprecated: please preference use of the value `pubmed.mesh.headings`
    **'
- name: mesh_terms
  type: STRING
  mode: REPEATED
  description: '** Deprecated: please preference use of the value `pubmed.mesh.terms`
    **'
- name: pubmed
  type: RECORD
  description: PubMed related details of a publication (MeSH terms, publication types
    etc.).
  fields:
  - name: mesh
    type: RECORD
    description: PubMed related MeSH terms, headings and unique ids, if known.
    fields:
    - name: terms
      type: STRING
      mode: REPEATED
      description: The MeSH terms if known, including subheadings.
    - name: headings
      type: STRING
      mode: REPEATED
      description: The MeSH headings if known, does not include the subheadings.
    - name: ui
      type: STRING
      mode: REPEATED
      description: The MeSH unique ids if known, including unique ids of subheadings.
  - name: publication_types
    type: STRING
    mode: REPEATED
    description: PubMed publication types, if known.
  - name: keywords
    type: STRING
    mode: REPEATED
    description: Keywords for the PubMed publication, if present.
- name: category_bra
  type: RECORD
  description: Broad Research Areas
  fields:
  - name: values
    type: STRING
    mode: REPEATED
    description: Listing of all category values assigned to this particular record.
  - name: full
    type: RECORD
    mode: REPEATED
    description: A complete listing of category values, assigned to this particular
      record, including the unique Dimensions identifier associated with each category
      value.
    fields:
    - name: id
      type: STRING
      description: Dimensions specific identifier assigned to the category value.
    - name: value
      type: STRING
      description: Category value associated with the simple classification scheme.
- name: category_for
  type: RECORD
  description: ANZSRC Fields of Research classification
  fields:
  - name: first_level
    type: RECORD
    description: First level of categorisation within the classification scheme.
    fields:
    - name: codes
      type: STRING
      mode: REPEATED
      description: A consolidated list of all category-specific codes at a particular
        classification level, assigned to this record.
    - name: full
      type: RECORD
      mode: REPEATED
      description: A listing of category values at a specific classification level,
        assigned to this particular record, including the unique Dimensions identifier
        associated with each category value.
      fields:
      - name: id
        type: STRING
        description: Dimensions specific identifier assigned to the category value.
      - name: code
        type: STRING
        description: Numeric or non-numeric category value code. Value is classification
          scheme specific.
      - name: name
        type: STRING
        description: Individual category value description, excluding the classification
          scheme specific code prefix.
  - name: second_level
    type: RECORD
    description: Second level of categorisation within the classification scheme.
    fields:
    - name: codes
      type: STRING
      mode: REPEATED
      description: A consolidated list of all category-specific codes at a particular
        classification level, assigned to this record.
    - name: full
      type: RECORD
      mode: REPEATED
      description: A listing of category values at a specific classification level,
        assigned to this particular record, including the unique Dimensions identifier
        associated with each category value.
      fields:
      - name: id
        type: STRING
        description: Dimensions specific identifier assigned to the category value.
      - name: code
        type: STRING
        description: Numeric or non-numeric category value code. Value is classification
          scheme specific.
      - name: name
        type: STRING
        description: Individual category value description, excluding the classification
          scheme specific code prefix.
