  - name: states
    type: STRING
    mode: REPEATED
    description: The states/regions identified in the raw organisation name, as ISO
      3166-2 codes.
  - name: grant_ids
    type: STRING
    mode: REPEATED
    description: The grant identifiers which were discovered from the raw contract
      or grant numbers.
  - name: raw_numbers
    type: STRING
    mode: REPEATED
    description: The raw contract or grant numbers as collected from the source.
- name: funder_orgs
  type: STRING
  mode: REPEATED
  description: GRID organizations funding the report (only disambiguated).
- name: funder_org_countries
  type: STRING
  mode: REPEATED
  description: Countries of the organizations funding the report.
- name: grant_ids
  type: STRING
  mode: REPEATED
  description: Resolved Dimensions grant identifiers referenced within the report.
