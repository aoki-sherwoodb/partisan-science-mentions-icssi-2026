table: reports
description: "Dimensions Reports data set - https://app.dimensions.ai/discover/report\n\
  Schema documentation: https://docs.dimensions.ai/bigquery/datasource-reports.html\n\
  \n\n---\nPrivacy and Terms of Use\n\nFor information on how we process personal\
  \ information, please refer to the privacy policy at https://www.dimensions.ai/privacy/.\n\
  \nRedistribution / external use of this Dimensions dataset is prohibited without\
  \ prior written approval. If you need to share or display Dimensions data in a way\
  \ that\u2019s not permitted by our agreement with you, please get in touch at info@dimensions.com."
fields:
- name: id
  type: STRING
  description: Dimensions report ID.
- name: doi
  type: STRING
  description: Digital object identifier.
- name: title
  type: STRING
  description: Title of a report.
- name: abstract
  type: STRING
  description: Abstract of a report.
- name: external_ids
  type: RECORD
  mode: REPEATED
  description: External identifiers available from the report publisher (e.g. OSTI
    ID).
  fields:
  - name: name
    type: STRING
    description: The name of a document number - for reports.
  - name: value
    type: STRING
    description: The value of the document number
- name: linkout
  type: STRING
  description: Original URL for the report.
- name: keywords
  type: STRING
  mode: REPEATED
  description: Keywords, as provided by the source.
- name: publication_ids
  type: STRING
  mode: REPEATED
  description: Resolved Dimensions publication identifiers from citations.
- name: date
  type: STRING
  description: Date of publication for report.
- name: year
  type: INTEGER
  description: Year of publication for report.
- name: authors
  type: RECORD
  mode: REPEATED
  description: Ordered list of authors names and their affiliations, as they appear
    in the source.
  fields:
  - name: first_name
    type: STRING
  - name: last_name
    type: STRING
  - name: researcher_id
    type: STRING
    description: The Dimensions assigned researcher ID.
  - name: affiliations
    type: RECORD
    mode: REPEATED
    description: Affiliation details associated with the report author.
    fields:
    - name: affiliation
      type: STRING
      description: The raw affiliation string as seen on the source type.
    - name: grid_ids
      type: STRING
      mode: REPEATED
      description: The assigned GRID IDs based on this affiliation.
    - name: cities
      type: INTEGER
      mode: REPEATED
      description: The cities identified in the affiliation, as geoname IDs.
    - name: countries_territories
      type: STRING
      mode: REPEATED
      description: The country/territories identified in the affiliation, as ISO-3166
        alpha-2 codes.
    - name: states
      type: STRING
      mode: REPEATED
      description: The states/regions identified in the affiliation, as ISO 3166-2
        codes.
- name: responsible_org_details
  type: RECORD
  mode: REPEATED
  description: Organizations responsible for the report, as they appear in the source.
  fields:
  - name: raw_name
    type: STRING
    description: The organisation name as collected from the source.
  - name: grid_ids
    type: STRING
    mode: REPEATED
    description: The assigned GRID IDs based on the raw organisation name.
  - name: cities
    type: INTEGER
    mode: REPEATED
    description: The cities identified in the raw organisation name, as geoname IDs.
  - name: countries_territories
    type: STRING
    mode: REPEATED
    description: The country/territories identified in the raw organisation name,
      as ISO-3166 alpha-2 codes.
  - name: states
    type: STRING
    mode: REPEATED
    description: The states/regions identified in the raw organisation name, as ISO
      3166-2 codes.
- name: responsible_orgs
  type: STRING
  mode: REPEATED
  description: GRID organizations responsible for the report.
- name: responsible_org_countries
  type: STRING
  mode: REPEATED
  description: Countries of the organisations responsible for the report, expressed
    as ISO-3166 alpha-2 codes.
- name: responsible_org_state_codes
  type: STRING
  mode: REPEATED
  description: "States of the organisations responsbile for the report, expressed\
    \ as GeoNames codes (ISO\u200C-3166-2)."
- name: responsible_org_cities
  type: INTEGER
  mode: REPEATED
  description: Cities of the organisations responsible for the report, expressed as
    GeoNames ID
- name: research_orgs
  type: STRING
  mode: REPEATED
  description: Combined list of GRID organisations associated with the report, because
    the source marks them as responsible for it, or because they appear as authors
    affiliations.
- name: research_org_countries
  type: STRING
  mode: REPEATED
  description: Countries of the organisations associated with the report, expressed
    as GeoNames code and name.
- name: research_org_state_codes
  type: STRING
  mode: REPEATED
  description: "States of the organisations associated with the report, expressed\
    \ as GeoNames codes (ISO\u200C-3166-2)."
- name: research_org_cities
  type: INTEGER
  mode: REPEATED
  description: Cities of the organisations associated with the report, expressed as
    GeoNames ID and name.
- name: publisher_details
  type: RECORD
  mode: REPEATED
  description: Organizations publishing the report, as they appear in the source.
  fields:
  - name: raw_name
    type: STRING
    description: The organisation name as collected from the source.
  - name: grid_ids
    type: STRING
    mode: REPEATED
    description: The assigned GRID IDs based on the raw organisation name.
  - name: cities
    type: INTEGER
    mode: REPEATED
    description: The cities identified in the raw organisation name, as geoname IDs.
  - name: countries_territories
    type: STRING
    mode: REPEATED
    description: The country/territories identified in the raw organisation name,
      as ISO-3166 alpha-2 codes.
  - name: states
    type: STRING
    mode: REPEATED
    description: The states/regions identified in the raw organisation name, as ISO
      3166-2 codes.
- name: publisher_orgs
  type: STRING
  mode: REPEATED
  description: GRID organizations publishing the report (only disambiguated).
- name: publisher_org_countries
  type: STRING
  mode: REPEATED
  description: Countries of the organizations publishing the report.
- name: funder_details
  type: RECORD
  mode: REPEATED
  description: Sponsors/funders of the research/report, as they appear in the source.
  fields:
  - name: raw_name
    type: STRING
    description: The organisation name as collected from the source.
  - name: grid_ids
    type: STRING
    mode: REPEATED
    description: The assigned GRID IDs based on the raw organisation name.
  - name: cities
    type: INTEGER
    mode: REPEATED
    description: The cities identified in the raw organisation name, as geoname IDs.
  - name: countries_territories
    type: STRING
    mode: REPEATED
