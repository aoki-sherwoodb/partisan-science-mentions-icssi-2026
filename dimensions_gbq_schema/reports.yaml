- name: concepts
  type: RECORD
  mode: REPEATED
  description: 'Concepts describing the main topics of the report (note: automatically
    derived from the text using machine learning).'
  fields:
  - name: concept
    type: STRING
    description: Normalized noun phrase describing a main topic within the document.
      Automatically derived using machine learning techniques.
  - name: relevance
    type: FLOAT
    description: "Relevance ranking of the normalized noun phrase within the document\u2019\
      s field of study."
- name: date_inserted
  type: TIMESTAMP
  description: Date when the record was inserted into Dimensions.
- name: date_normal
  type: DATE
  description: The report date for the version of record of a document, normalised
    for partial dates which do not include a month/day value (ie. '2020' converts
    to '2020-01-01').
- name: date_imported_gbq
  type: TIMESTAMP
  description: Timestamp when the report was last imported into BigQuery. Incremental
    changes can be determined using this field. Note, however at certain times all
    records may be reimported.
