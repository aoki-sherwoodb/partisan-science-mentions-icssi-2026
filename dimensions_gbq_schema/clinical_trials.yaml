- name: date_inserted
  type: TIMESTAMP
  description: Date when the record was inserted into Dimensions.
- name: date_imported_gbq
  type: TIMESTAMP
  description: Timestamp when the clinical trial was last imported into BigQuery.
    Incremental changes can be determined using this field. Note, however at certain
    times all records may be reimported.
- name: registration_date
  type: TIMESTAMP
  description: The date the trial is entered onto a publicly accessible register.
- name: concepts
  type: RECORD
  mode: REPEATED
  description: 'Concepts describing the main topics of a clinical trial (note: automatically
    derived from the publication text using machine learning).'
  fields:
  - name: concept
    type: STRING
    description: Normalized noun phrase describing a main topic within the document.
      Automatically derived using machine learning techniques.
  - name: relevance
    type: FLOAT
    description: "Relevance ranking of the normalized noun phrase within the document\u2019\
      s field of study."
- name: funding_details
  type: RECORD
  mode: REPEATED
  description: List of details regarding grants associated to the clinical trial.
  fields:
  - name: grid_id
    type: STRING
    description: The GRID ID of the funder, if identified.
  - name: grant_id
    type: STRING
    description: The Dimensions grant ID, if identified.
- name: altmetrics
  type: RECORD
  description: If available, Altmetric details relating to the clinical trial.
  fields:
  - name: id
    type: STRING
    description: Altmetrics record identifier
  - name: score
    type: INTEGER
    description: Altmetric Attention Score
