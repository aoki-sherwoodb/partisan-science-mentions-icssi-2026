- name: reference_ids
  type: STRING
  mode: REPEATED
  description: List of Dimensions IDs of the patents which are cited by this patent.
    This field may in some cases include identifiers of provisional patent applications
    that are not yet in the Dimensions database. In such cases, on the Dimensions
    web application patent detail page, the total number of references will be slightly
    different as the web application only shows fully resolved identifiers.
- name: funding_details
  type: RECORD
  mode: REPEATED
  description: List of GRID organisations funding the patent, together with the respective
    Dimensions grant ID.
  fields:
  - name: grid_id
    type: STRING
    description: Dimensions organisation identifier (GRID) of the funder, if identified.
  - name: grant_id
    type: STRING
    description: Dimensions grant identifier linked to the funding, if identified.
- name: publication_ids
  type: STRING
  mode: REPEATED
  description: 'List of Dimensions IDs of the publications referenced in the front-page
    of the patent. Note: all resolved publications present within patent can be found
    within the non-patent citations array (``npc_references``).'
- name: application_reference_id
  type: STRING
  description: The id of the referenced application.
- name: npc_references
  type: RECORD
  mode: REPEATED
  description: Non-patent citations references determined from the patent document.
  fields:
  - name: publication_id
    type: STRING
    description: Dimension's publication identifier for the citation within the patent.
  - name: source
    type: STRING
    description: Location within the patent of the non-patent citation, current options
      are `front_page` or `in_text`.
- name: claims_amount
  type: INTEGER
  description: The number of claims associated with a patent.
- name: figures_amount
  type: INTEGER
  description: The number of figures provided for this patent.
- name: associated_grant_ids
  type: STRING
  mode: REPEATED
  description: List of Dimensions IDs of the grants associated to the patent.
- name: funder_orgs
  type: STRING
  mode: REPEATED
  description: List of GRID organisations funding the patent.
- name: date_imported_gbq
  type: TIMESTAMP
  description: Timestamp when the patent was last imported into BigQuery. Incremental
    changes can be determined using this field. Note, however at certain times all
    records may be reimported.
- name: expiration_year
  type: INTEGER
  description: Year when the patent expires.
- name: publication_year
  type: INTEGER
  description: Year of publication of a patent.
- name: filing_year
  type: INTEGER
  description: The year the patent was filed.
- name: priority_year
  type: INTEGER
  description: The filing year of the earliest application of which priority is claimed.
- name: granted_year
  type: INTEGER
  description: The year on which the official body grants the patent.
- name: cited_by_ids
  type: STRING
  mode: REPEATED
  description: List of Dimensions IDs of the patents that cite this patent.
- name: family_members_ids
  type: STRING
  mode: REPEATED
  description: Dimensions IDs of the other patents in the same family (excluding the
    patent the relationship originates from).
- name: family_count
  type: INTEGER
  description: The total count of patents in the same family.
